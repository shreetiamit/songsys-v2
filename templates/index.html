<!DOCTYPE html>
<html>
<head>
  <title>Songsys V2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      color: #1DB954;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #1DB954;
      color: white;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #suggestions div {
      padding: 10px;
      background: #1e1e1e;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    #suggestions div:hover {
      background: #333;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .artist {
      color: #aaa;
      font-size: 14px;
    }

    .score {
      color: #1DB954;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎵 Songsys</h1>

    <input id="track" placeholder="Search a song..." oninput="suggest()">
    <div id="suggestions"></div>

    <button onclick="recommend()">Get Recommendations</button>

    <div id="results"></div>
  </div>

<script>
async function suggest() {
  const q = document.getElementById("track").value;

  if (!q) {
    document.getElementById("suggestions").innerHTML = "";
    return;
  }

  const res = await fetch(`/api/suggest?q=${q}`);
  const data = await res.json();

  document.getElementById("suggestions").innerHTML =
    data.map(item => `<div onclick="selectSong('${item}')">${item}</div>`).join("");
}

function selectSong(val) {
  document.getElementById("track").value = val;
  document.getElementById("suggestions").innerHTML = "";
}

async function recommend() {
  const track = document.getElementById("track").value;

  const res = await fetch("/api/recommend", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({track})
  });

  const data = await res.json();

  const resultsDiv = document.getElementById("results");

  if (!data.found) {
    resultsDiv.innerHTML = "<p>No results found</p>";
    return;
  }

  resultsDiv.innerHTML = data.results.map(song => `
    <div class="card">
      <div><b>${song.track_name}</b></div>
      <div class="artist">${song.track_artist}</div>
    </div>
  `).join("");
}
</script>

</body>
</html>
